services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assignment_tickets
      POSTGRES_USER: assignment_tickets
      POSTGRES_PASSWORD: assignment_tickets
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assignment_tickets -d assignment_tickets"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://assignment_tickets:assignment_tickets@postgres:5432/assignment_tickets
      NGINX_PORT: 8080
    restart: unless-stopped

volumes:
  postgres-data:
