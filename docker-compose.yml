services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assignment_tickets
      POSTGRES_USER: assignment_tickets
      POSTGRES_PASSWORD: assignment_tickets
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assignment_tickets -d assignment_tickets"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      db-proxy-forwarder:
        condition: service_started
    ports:
      - "80:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 192.168.8.1
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://assignment_tickets:assignment_tickets@postgres:5432/assignment_tickets
      NGINX_PORT: 8080
      AI_TRIAGE_GIT_PULL: "false"
      PUBSUB_PROJECT_ID: napp-pubsub-prd
      PUBSUB_CREDENTIALS_FILE: /workspace/pubsub/kauetorres-dev.json
    volumes:
      - ${HOME}/.claude:/root/.claude:ro
      - ${HOME}/.claude.json:/root/.claude.json:ro
      - ${HOME}/.ssh:/root/.ssh:ro
      - /home/kauetorres/Documentos/Platform/platform-backend:/workspace/platform-backend:ro
      - /home/kauetorres/Documentos/workspace/Pubsub:/workspace/pubsub:ro
    restart: unless-stopped

  db-proxy-forwarder:
    image: alpine/socat:latest
    network_mode: host
    command:
      - TCP-LISTEN:5436,bind=172.17.0.1,fork,reuseaddr
      - TCP:127.0.0.1:5435
    restart: unless-stopped

volumes:
  postgres-data:
